# dev.yaml override for agent-backend
dockerRegistry: reg.mof.az/library
imagePullSecrets: regkey

applicationName: agent-backend
namespace: tickets-dev
replicaCount: 1

image:
  name: vektor-code/agent-backend
  tag: prod-latest
  pullPolicy: IfNotPresent

secrets:
  enabled: false
  data: []

configmaps:
  enabled: false

terminationGracePeriodSeconds: 30

ports:
  enabled: true
  containerPort: 4317

service:
  enabled: true
  type: ClusterIP
  port: 4317

hostsfile:
  enabled: false
  records: []

strategy:
  enabled: true
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
minReadySeconds: 5
revisionHistoryLimit: 1

hpa:
  enabled: false

resources:
  enabled: true
  limits:
    memory: 256Mi
    cpu: 0.25
  requests:
    cpu: 50m
    memory: 64Mi

readinessProbe:
  enabled: false

livenessProbe:
  enabled: false

istio:
  enabled: false

ingress:
  enabled: false

env:
  - name: GRPC_ADDR
    value: "0.0.0.0:4317"
  - name: CENTRAL_URL
    value: "http://api-backend.tickets-dev.svc.cluster.local:8080/v1/traces"
  - name: BUFFER_DIR
    value: "/tmp/spool"
  - name: QUEUE_LIMIT
    value: "500"
  - name: DISK_LIMIT_FILES
    value: "2000"
  - name: TZ
    value: 'Asia/Baku'
